name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build pyvrs on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # UPDATED: Replaced macos-13 with macos-latest
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update -y
            sudo apt-get install -o Acquire::Retries=5 \
              cmake git ninja-build libgtest-dev libfmt-dev \
              libjpeg-dev libturbojpeg-dev libpng-dev \
              liblz4-dev libzstd-dev libxxhash-dev \
              libboost-system-dev libboost-filesystem-dev libboost-thread-dev libboost-chrono-dev libboost-date-time-dev \
              portaudio19-dev libopus-dev
            python -m pip install -U pip
            python -m pip install pybind11[global]

          elif [ "$RUNNER_OS" == "macOS" ]; then
              # Update or install cmake
              brew upgrade cmake || brew install cmake
              brew install git ninja googletest glog fmt \
                  jpeg-turbo libpng \
                  lz4 zstd xxhash \
                  boost \
                  portaudio opus pybind11

          else
              echo "$RUNNER_OS not supported"
              exit 1
          fi
          python -m pip install -U pip
          python -m pip install numpy typing dataclasses pytest parameterized Pillow

      - name: Pre-download virtualenv to avoid GitHub rate limits
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VIRTUALENV_VERSION=20.21.1
          if [ "$RUNNER_OS" == "macOS" ]; then
            CACHE_DIR="$HOME/Library/Caches/cibuildwheel"
          else
            CACHE_DIR="$HOME/.cache/cibuildwheel"
          fi
          mkdir -p "$CACHE_DIR"
          DEST="$CACHE_DIR/virtualenv-${VIRTUALENV_VERSION}.pyz"
          if [ ! -f "$DEST" ]; then
            # Use GitHub API (authenticated, 5000 req/hr) instead of raw blob URL (unauthenticated, 60 req/hr)
            curl -sL --retry 5 --retry-delay 10 --retry-all-errors \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              -o "$DEST" \
              "https://api.github.com/repos/pypa/get-virtualenv/contents/public/virtualenv.pyz?ref=${VIRTUALENV_VERSION}"
          fi
          ls -la "$DEST"

      - name: Install cibuildwheel
        run: |
          python -m pip install cibuildwheel==2.17.0

      - name: Build wheels for CPython
        run: |
          python -m cibuildwheel --output-dir dist
        env:
          CIBW_ARCHS_LINUX: x86_64
          # UPDATED: Changed to arm64 because macos-latest is now Apple Silicon
          CIBW_ARCHS_MACOS: "arm64"

          CIBW_BUILD: "cp39-*64 cp310-*64 cp311-*64 cp312-*64"
          CIBW_BEFORE_BUILD_LINUX: bash scripts/install-manylinux-deps.sh
          CIBW_BEFORE_BUILD_MACOS: bash scripts/install-macos-deps.sh
          CIBW_SKIP: "*-manylinux_i686 *musllinux*"
          # Homebrew libs on macos-latest (macOS 15) require 15.0, must match wheel platform tag.
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15.0

      - name: Build and Test Python
        shell: bash
        run: |
          pip install -e .
          python -m pytest test

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
